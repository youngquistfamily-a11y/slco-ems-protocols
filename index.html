<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b1220" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#1d4ed8" media="(prefers-color-scheme: light)">
<title>SLCo EMS Protocols</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SLCo Protocols">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header class="topbar" id="topbar">
  <button class="icon-btn" id="backBtn" aria-label="Back" hidden>
    <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>
  <h1 id="topTitle">SLCo EMS Protocols</h1>
  <span class="icon-btn" aria-hidden="true" style="visibility:hidden"></span>
</header>

<div class="search-wrap" id="searchWrap">
  <div class="search-box">
    <svg class="search-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="2"/><path d="M21 21l-4.3-4.3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    <input id="searchInput" type="search" inputmode="search" placeholder="Search protocols, drugs, doses…" autocomplete="off">
    <button id="clearSearch" class="clear-btn" hidden aria-label="Clear search">&times;</button>
  </div>
</div>

<main id="app"></main>

<div class="viewer" id="viewer" hidden>
  <div class="viewer-toolbar">
    <button class="icon-btn" id="viewerClose" aria-label="Close">
      <svg viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg>
    </button>
    <span class="viewer-title" id="viewerTitle"></span>
    <button class="icon-btn" id="favBtn" aria-label="Toggle favorite">
      <svg viewBox="0 0 24 24"><path d="M12 4.5c1.7-2 5.7-2.3 7.8.5 2 2.7 1 6-1 8-2 2-4.8 4.3-6.8 6-2-1.7-4.8-4-6.8-6-2-2-3-5.3-1-8 2.1-2.8 6.1-2.5 7.8-.5z" fill="none" stroke="currentColor" stroke-width="2"/></svg>
    </button>
  </div>
  <div class="viewer-page-controls" style="justify-content:center; padding:0 10px 8px; background:var(--surface); border-bottom:1px solid var(--border);">
    <button class="icon-btn small" id="prevPage" aria-label="Previous page">&lsaquo;</button>
    <span id="pageIndicator">1 / 1</span>
    <button class="icon-btn small" id="nextPage" aria-label="Next page">&rsaquo;</button>
  </div>
  <div class="viewer-canvas-wrap" id="viewerCanvasWrap">
    <canvas id="pdfCanvas"></canvas>
  </div>
  <div class="viewer-zoom">
    <button class="icon-btn small" id="zoomOut" aria-label="Zoom out">&minus;</button>
    <span id="zoomIndicator">100%</span>
    <button class="icon-btn small" id="zoomIn" aria-label="Zoom in">+</button>
  </div>
</div>

<nav class="tabbar" id="tabbar">
  <button class="tab-btn active" data-view="home">
    <svg viewBox="0 0 24 24"><path d="M4 11.5L12 4l8 7.5M6 10v9h12v-9" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
    <span>Home</span>
  </button>
  <button class="tab-btn" data-view="favorites">
    <svg viewBox="0 0 24 24"><path d="M12 4.5c1.7-2 5.7-2.3 7.8.5 2 2.7 1 6-1 8-2 2-4.8 4.3-6.8 6-2-1.7-4.8-4-6.8-6-2-2-3-5.3-1-8 2.1-2.8 6.1-2.5 7.8-.5z" fill="none" stroke="currentColor" stroke-width="2"/></svg>
    <span>Favorites</span>
  </button>
  <button class="tab-btn" data-view="admin">
    <svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    <span>Admin</span>
  </button>
  <button class="tab-btn" data-view="settings">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="2"/><path d="M12 2v3M12 19v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M2 12h3M19 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    <span>Settings</span>
  </button>
</nav>

<div class="offline-toast" id="offlineToast" hidden>You're offline — using cached protocols</div>
<div class="update-toast" id="updateToast" hidden>
  <span>New content available</span>
  <button id="updateReload">Reload</button>
</div>

<script>if (location.search.includes("nosw")) window.__DISABLE_SW_FOR_DEV__ = true;</script>
<script type="module" src="js/app.js"></script>
</body>
</html>
